<svg width="800" height="160" viewBox="0 0 800 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text-title {
      font-family: 'Sora', 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      font-size: 38px;
      fill: url(#headerGrad);
      filter: drop-shadow(0px 8px 16px rgba(245, 74, 42, 0.3));
      letter-spacing: 0.08em;
    }
    .text-subtitle {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 600;
      font-size: 13px;
      fill: #ffffff;
      opacity: 0.65;
      letter-spacing: 0.16em;
    }
    .glow-blob {
      animation: floatBlob 7s ease-in-out infinite alternate;
    }
    @keyframes floatBlob {
      0% { transform: translate(0px, 0px) scale(1); filter: blur(35px); opacity: 0.35; }
      100% { transform: translate(30px, -15px) scale(1.18); filter: blur(45px); opacity: 0.6; }
    }
  </style>
  <rect width="800" height="160" fill="#140d0c" rx="16" />
  
  <!-- Background Blur Decorative Blobs -->
  <circle class="glow-blob" cx="190" cy="80" r="75" fill="#e11d48" />
  <circle class="glow-blob" cx="610" cy="90" r="65" fill="#F54A2A" style="animation-delay: -3.5s;" />
  
  <!-- Title Text -->
  <text x="50%" y="78" dominant-baseline="middle" text-anchor="middle" class="text-title">Z E N S C A N</text>
  <text x="50%" y="122" dominant-baseline="middle" text-anchor="middle" class="text-subtitle">HIGH-PERFORMANCE SYSTEM DIAGNOSTICS & UTILITY</text>
  
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F54A2A" />
      <stop offset="50%" stop-color="#e11d48" />
      <stop offset="100%" stop-color="#F54A2A" />
    </linearGradient>
  </defs>
</svg>